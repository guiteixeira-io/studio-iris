version: "3.8"

services:
  wordpress:
    image: wordpress:latest
    container_name: studioiris-wordpress
    restart: always
    ports:
      - "3780:80"
    env_file: .env
    volumes:
      - ./wp-content:/var/www/html/wp-content
    networks:
      - sigma-net
    depends_on:
      - db

  db:
    image: mariadb:10.6
    container_name: studioiris-db
    restart: always
    env_file: .env
    ports:
      - "127.0.0.1:3754:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - sigma-net

volumes:
  db_data:

networks:
  sigma-net:
    external: true
